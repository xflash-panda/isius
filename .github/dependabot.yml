version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    target-branch: dev
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    target-branch: dev
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
